name: Bug report
description: Report a reproducible non-security defect
body:
  - type: markdown
    attributes:
      value: Security vulnerabilities must use https://github.com/mojomast/ludotape/security/advisories/new
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Include exact commands, inputs, and observed output.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Node version and operating system
    validations:
      required: true
