name: CI
on:
  push:
  pull_request:
permissions:
  contents: read
jobs:
  check:
    strategy:
      matrix:
        node: [20, 22, current]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: npm run check
