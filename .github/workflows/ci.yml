name: CI
on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:
permissions:
  contents: read
jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/lint.mjs

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # typescript is fetched ad hoc for this job only via `npx --yes`; it is never a
      # package dependency (repo stays zero-dependency, dev or otherwise). The declaration
      - name: Type-check declaration files
        run: |
          npx --yes -p typescript@5 tsc --noEmit --strict --module nodenext --moduleResolution nodenext \
            types/ludotape.d.ts types/core.d.ts src/cores/js-ts-core/types.d.ts

  test:
    name: test (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22, current]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: npm test

  conformance:
    name: core conformance
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # The conformance harness and its tests are owned by a separate work stream; guard
      # on presence so this job passes cleanly until they land.
      - name: Run core conformance suite (if present)
        run: |
          if [ -f test/core-conformance.test.mjs ] && [ -f test/core-loader.test.mjs ]; then
            node --test test/core-conformance.test.mjs test/core-loader.test.mjs
          else
            echo "Skipping conformance: test/core-conformance.test.mjs and/or test/core-loader.test.mjs not present yet."
          fi

  build-smoke:
    name: build + smoke
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm run build
      - run: npm run smoke
      - run: npm run package-smoke

  benchmark:
    name: benchmark (evidence, non-blocking)
    runs-on: ubuntu-latest
    needs: test
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm run benchmark
      # Core-dispatch benchmark compares direct vs ICore-surface dispatch; it self-skips
      # with exit 0 until the js-ts core lands, so no extra existence guard is required,
      # but we still confirm the script itself is present for defense in depth.
      - name: Run core dispatch benchmark (if present)
        run: |
          if [ -f bench/core-dispatch.bench.mjs ]; then
            node bench/core-dispatch.bench.mjs
          else
            echo "Skipping bench/core-dispatch.bench.mjs: file not present yet."
          fi

  publish:
    name: publish (dry-run)
    runs-on: ubuntu-latest
    needs: [test, build-smoke]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm run build
      # Dry-run only: proves the publish step is wired and the tarball is valid without
      # touching the registry. To enable a REAL publish on tag push, replace the line
      # below with:
      #
      #   npm publish --provenance --access public
      #
      # and either:
      #   (a) set an NPM_TOKEN secret and add `env: {NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}}`
      #       to this step, or
      #   (b) configure npm Trusted Publishing (OIDC) for this package on npmjs.com and rely
      #       on the `id-token: write` permission already granted to this job — no token
      #       needed. Trusted publishing requires npm >= 11.5.1 (bundled with Node >= 22.14).
      - run: npm publish --provenance --access public --dry-run
