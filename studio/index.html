<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><title>Ludotape Studio</title><link rel="stylesheet" href="style.css"></head><body><header><h1>Ludotape <small>Games you can rewind</small></h1><nav><button data-tab="help">Help</button><button data-tab="editor">Editor</button><button data-tab="play">Play</button><button data-tab="replay">Replay</button></nav></header><main><section id="help"><h2>Help</h2><p>Pick an example, play only legal actions, export its deterministic replay, or edit the cartridge document as JSON. Data remains local unless you export it.</p><label>Game <select id="game"><option value="warehouse">Warehouse Circuit</option><option value="cards">Seeded Card Duel</option></select></label><label>Seed <input id="seed" type="number" value="7"></label><button id="load">Load game</button></section><section id="editor" hidden><h2>Document editor</h2><textarea id="document" spellcheck="false"></textarea><p><button id="apply">Apply and restart</button> <span id="editor-status"></span></p></section><section id="play" hidden><h2>Play</h2><div class="views"><div><h3>Semantic</h3><div id="semantic"></div></div><div><h3>Canvas</h3><canvas id="canvas" width="440" height="300"></canvas></div></div><div id="actions"></div><p><button id="rewind">Rewind one turn</button> Turn <output id="turn">0</output></p></section><section id="replay" hidden><h2>Replay</h2><textarea id="replay-text" spellcheck="false"></textarea><p><button id="export">Export current</button> <button id="verify">Verify and load</button></p><pre id="verify-status"></pre></section></main><script type="module" src="app.mjs"></script></body></html>
